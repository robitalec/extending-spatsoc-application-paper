project:
  type: manuscript
  output-dir: public
  execute-dir: project
  render: 
    - "index.qmd"
    - "supplement-a.qmd"
    - "supplement-b.qmd"
    - "supplement-c.qmd"
    - "!title-page.qmd"


format:
  jats: default
  html:
    theme:
      dark: darkly
      light: flatly
    toc: true
    code-line-numbers: false
    code-copy: true
    code-link: true
    code-block-border-left: false
    comments:
      hypothesis: true
  typst: default

